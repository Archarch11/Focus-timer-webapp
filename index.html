<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snooze Police</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #eae4db;
  --ink: #262626;
  --white: #fafafa;
  --pink: #f5c6d2;
  --orange: #f5c08a;
  --font: 'Chakra Petch', sans-serif;
  --field-h: 77px;
  --field-inner-top: 9px;
  --field-inner-bot: 70px;
  --pill-h: 46px;
  --pill-inner-top: 1px;
  --pill-inner-bot: 41px;
}

body {
  background: #F5EFE7;
  font-family: var(--font);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════
   SCREEN SYSTEM
═══════════════════════════════════════════════════════ */
.app {
  width: 100%;
  max-width: 520px;
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen {
  width: 100%;
  padding: 52px 36px 56px;
  display: flex;
  flex-direction: column;
  position: absolute;
  transition: none;
}

.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: none;
}

/* ═══════════════════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════════════════ */
.field-group { margin-bottom: 36px; }

.field-label {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
  display: block;
  line-height: 1.2;
}

.hd-shell {
  position: relative;
  height: var(--field-h);
  width: 100%;
}
.hd-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  display: block;
}
.hd-content {
  position: absolute;
  top: var(--field-inner-top);
  bottom: calc(var(--field-h) - var(--field-inner-bot));
  left: 0; right: 0;
  display: flex;
  align-items: center;
  padding: 0 16px;
}

.name-content input {
  width: 100%;
  background: transparent;
  border: none; outline: none;
  font-family: var(--font);
  font-size: 17px; font-weight: 500; color: var(--ink);
  line-height: 1;
}
.name-content input::placeholder { color: #b0a89f; font-weight: 400; }

.stepper-content { width: 100%; display: flex; align-items: center; }

.stepper-btn {
  width: 36px; height: 36px; flex-shrink: 0;
  border: none; background: transparent;
  font-family: var(--font); font-size: 22px; color: var(--ink);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; transition: background 0.1s;
  user-select: none; line-height: 1; padding: 0;
}
/* Chakra Petch glyph corrections */
.stepper-btn:first-child { padding-top: 2px; }    /* − nudge up slightly */
.stepper-btn:last-child  { padding-bottom: 8px; } /* + glyph hangs low — push up harder */
.stepper-btn:hover  { background: rgba(38,38,38,0.07); }
.stepper-btn:active { background: rgba(38,38,38,0.14); }

.stepper-value {
  flex: 1; text-align: center;
  font-size: 17px; font-weight: 500; color: var(--ink);
  position: relative; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: text;
}
.stepper-value span { pointer-events: none; user-select: none; line-height: 1; }
.stepper-value input {
  position: absolute; inset: 0; width: 100%; height: 100%;
  background: transparent; border: none; outline: none;
  font-family: var(--font); font-size: 17px; font-weight: 500;
  color: #b0a89f; /* starts gray, JS changes to #262626 on typing */
  text-align: center; display: none; padding: 0; line-height: 1;
}

.presets { display: flex; gap: 9px; margin-top: 12px; }
.pill-shell { flex: 1; position: relative; height: var(--pill-h); }
.pill-shell .hd-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; display: block; }
.pill-shell button {
  position: absolute;
  top: var(--pill-inner-top);
  bottom: calc(var(--pill-h) - var(--pill-inner-bot));
  left: 0; right: 0;
  border: none; background: transparent;
  font-family: var(--font); font-size: 17px; font-weight: 400; color: var(--ink);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1; transition: opacity 0.1s; z-index: 1;
}
.pill-shell button:active { opacity: 0.65; }

.hint {
  font-size: 12px; color: #7a6e67;
  margin-top: 5px; padding-left: 2px; font-style: italic;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.hint.visible { opacity: 1; }

/* Inline helper message — between field and pills; zero height when empty */
.field-msg {
  font-size: 12px;
  color: #7a6e67;
  font-style: italic;
  font-family: var(--font);
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  margin: 0;
  padding: 0;
  transition: max-height 0.2s ease, opacity 0.2s ease, margin 0.2s ease;
  pointer-events: none;
}
.field-msg.visible {
  max-height: 30px;
  opacity: 1;
  margin-top: 6px;
  margin-bottom: 2px;
}

/* Disabled stepper button */
.stepper-btn:disabled,
.stepper-btn.disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Back button row — screen edge, clearly left of the content column */
.timer-back-row {
  position: absolute;
  top: 44px;
  left: 18px;
}
.timer-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
  background: transparent;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  padding: 0;
  letter-spacing: 0.1px;
}
.timer-back-btn:hover { opacity: 0.7; }

/* ═══════════════════════════════════════════════════════
   TIMER SCREEN
═══════════════════════════════════════════════════════ */
#timer-screen {
  padding: 0;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.timer-screen-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  /* Reduced from 80px — clock should sit higher, not float in dead space */
  padding: 44px 36px 40px;
}

/* Clock SVG */
.clock-svg {
  width: 390px; height: 390px; display: block;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
              margin-bottom 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  transform-origin: center top;
  /* No bottom margin by default */
  margin-bottom: 0;
}

/*
  Pause state: scale(0.72) — slightly larger than before so clock stays prominent.
  Visual height = 390 × 0.72 = 280.8px  →  dead space = 109px.
  translateY(-16px) pulls it up slightly from transform-origin:center top.
*/
.timer-screen-inner.is-paused .clock-svg {
  transform: scale(0.72) translateY(-16px);
  margin-bottom: -109px;
}

/* Work duration slot: scale down a touch so the clock reads as the hero */
.timer-screen-inner.is-paused #pause-work-slot {
  transform: scale(0.93) translateY(0);
  transform-origin: center top;
}

/*
  Slot that receives the real #work-field-group DOM node on pause.
  Hidden by default; fades + slides in when .visible is added.
*/
#pause-work-slot {
  width: 100%;
  max-width: 420px;
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  /* No top gap — clock margin-bottom compensation handles the spacing */
  margin-top: 0;
}
#pause-work-slot.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* Tighten field-group when it lives inside the slot */
#pause-work-slot .field-group {
  margin-bottom: 0;
}

/* Work duration field on timer screen */
.timer-work-field {
  width: 100%;
  max-width: 420px;
  margin-top: 28px;
}
.timer-work-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
  display: block;
}

/* ── Timer buttons — clean rectangle, matches reference screenshot ── */
.timer-btns {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 56px;
}

.timer-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  height: 56px;
  min-width: 160px;
  padding: 0 28px;
  background: #F5EDE3;
  border: 1.5px solid #d4cdc5;
  border-radius: 2px;
  box-shadow: 3px 4px 0px rgba(0,0,0,0.12);
  font-family: var(--font);
  font-size: 17px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  letter-spacing: 0.1px;
  transition: transform 0.07s, box-shadow 0.07s;
}
.timer-btn:hover  { background: #ede6dc; }
.timer-btn:active {
  transform: translate(2px, 3px);
  box-shadow: 1px 1px 0px rgba(0,0,0,0.08);
}
.timer-btn svg { flex-shrink: 0; }


/* Start button */
.start-wrap { display: flex; justify-content: center; margin-top: 24px; padding-bottom: 4px; }
.start-btn {
  position: relative;
  width: 220px; height: 50px;
  background: #6AADEE;
  border-radius: 2px;
  font-family: var(--font); font-size: 17px; font-weight: 500; color: #1a1a1a;
  cursor: pointer; letter-spacing: 0.3px;
  display: flex; align-items: center; justify-content: center;
  border-top: none; border-left: none;
  border-right: 2px solid #2a2a2a;
  border-bottom: 2px solid #2a2a2a;
  box-shadow: 3px 3px 0 0 #2a2a2a;
  transition: box-shadow 0.07s, transform 0.07s;
}
.start-btn:hover { background: #7abcf5; }
.start-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 0 #2a2a2a; }

/* ═══════════════════════════════════════════════════════
   END-OF-TIMER MODAL
═══════════════════════════════════════════════════════ */

/* Full-screen backdrop — sits above everything */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(180, 170, 158, 0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  /* Hidden by default */
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.modal-backdrop.visible {
  opacity: 1;
  pointer-events: auto;
}

/* Modal card */
.modal-card {
  background: #FAFAF8;
  border: 1.5px solid #d4cdc5;
  border-radius: 4px;
  width: min(480px, calc(100vw - 48px));
  padding: 36px 32px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  transform: translateY(12px);
  transition: transform 0.3s ease;
}
.modal-backdrop.visible .modal-card {
  transform: translateY(0);
}

.modal-heading {
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
  text-align: center;
  line-height: 1.3;
  margin-bottom: 4px;
}
.modal-subtext {
  font-size: 15px;
  font-weight: 400;
  color: #5a5047;
  text-align: center;
  line-height: 1.4;
  margin-bottom: 20px;
}

/* Image area */
.modal-img {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 3px;
  overflow: hidden;
  background: #e8e0d8;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
/* Placeholder when no image */
.modal-img-placeholder {
  font-size: 13px;
  color: #9a9188;
  font-style: italic;
}

/* Button row */
.modal-btns {
  display: flex;
  gap: 14px;
  width: 100%;
  justify-content: center;
}

/* "Snooze" — same style as Pause/Restart */
.modal-snooze-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 56px;
  min-width: 140px;
  padding: 0 24px;
  background: #F5EDE3;
  border: 1.5px solid #d4cdc5;
  border-radius: 2px;
  box-shadow: 3px 4px 0px rgba(0,0,0,0.12);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  letter-spacing: 0.1px;
  transition: transform 0.07s, box-shadow 0.07s;
}
.modal-snooze-btn:hover  { background: #ede6dc; }
.modal-snooze-btn:active { transform: translate(2px, 3px); box-shadow: 1px 1px 0 rgba(0,0,0,0.08); }

/* "I'll rest up" — same style as Start Session */
.modal-rest-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 56px;
  min-width: 160px;
  padding: 0 28px;
  background: #6AADEE;
  border-radius: 2px;
  border-top: none; border-left: none;
  border-right: 2px solid #2a2a2a;
  border-bottom: 2px solid #2a2a2a;
  box-shadow: 3px 3px 0 0 #2a2a2a;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 500;
  color: #1a1a1a;
  cursor: pointer;
  letter-spacing: 0.2px;
  transition: box-shadow 0.07s, transform 0.07s;
}
.modal-rest-btn:hover  { background: #7abcf5; }
.modal-rest-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 0 #2a2a2a; }
</style>
</head>

/* ── 6. CLOCK SECTOR DRAWING ── */
/*
  The orange shape is a FILLED PIE SLICE (sector) drawn with an SVG path.

  Clock geometry:
    Center:  CX=277.113, CY=276.573  (clock hand pivot, from SVG)
    Radius:  R=200  (reaches just inside the decorative ring border)

  Coordinate system reminder (SVG):
    - x increases RIGHT
    - y increases DOWN (opposite of standard math)
    - "12 o'clock" top = (CX, CY - R)

  Sector start: always 12 o'clock (top of clock), fixed.
  Sector sweeps: ANTI-CLOCKWISE by `angleDeg`.

  Anti-clockwise in SVG screen space = sweep-flag 0.

  Point on circle at angle θ anti-clockwise from 12 o'clock:
    x = CX - R × sin(θ)      ← negative sin moves LEFT (anti-clockwise)
    y = CY - R × cos(θ)      ← minus cos: at θ=0 gives top (CY-R); at θ=180 gives bottom (CY+R)

  SVG arc path for the sector:
    M CX CY               — move to center
    L startX startY        — line to 12 o'clock (start of arc)
    A R R 0 largeArc 0     — arc, counter-clockwise (sweep=0)
      endX endY            —   to end point
    Z                      — close back to center

  large-arc-flag = 1 when angleDeg > 180°, else 0.

  Timer countdown mapping:
    Full 60-min clock face = 360°.
    Remaining time in seconds → remaining minutes → degrees.
    angleDeg = (timerLeft / 60) × 6     (since 1 min = 6°)
*/

// R = 165: outer edge sits at the digit/tick-mark ring, not the full face border
const CX = 277.113, CY = 276.573, R = 165;

/**
 * Build an SVG 'd' string for a pie sector.
 * @param {number} angleDeg  Arc span in degrees (0 = nothing, 360 = full circle)
 * @returns {string} SVG path data
 */
function sectorPath(angleDeg) {
  if (angleDeg <= 0) return '';

  // Full circle: SVG can't draw a 360° arc in one command,
  // so we use a well-known trick — two 180° arcs joined.
  if (angleDeg >= 359.99) {
    return [
      `M ${CX} ${CY}`,
      `L ${CX} ${(CY - R).toFixed(3)}`,
      `A ${R} ${R} 0 1 0 ${CX} ${(CY + R).toFixed(3)}`,  // top → bottom (CW half)
      `A ${R} ${R} 0 1 0 ${CX} ${(CY - R).toFixed(3)}`,  // bottom → top (CW half)
      'Z'
    ].join(' ');
  }

  const θ = angleDeg * Math.PI / 180;

  // 12 o'clock — fixed start of the sector
  const startX = CX;
  const startY = CY - R;

  // End of arc, swept anti-clockwise by θ from 12 o'clock
  const endX = CX - R * Math.sin(θ);
  const endY = CY - R * Math.cos(θ);

  // large-arc-flag: 1 if the arc spans more than a semicircle
  const largeArc = angleDeg > 180 ? 1 : 0;

  return [
    `M ${CX} ${CY}`,
    `L ${startX.toFixed(3)} ${startY.toFixed(3)}`,
    `A ${R} ${R} 0 ${largeArc} 0 ${endX.toFixed(3)} ${endY.toFixed(3)}`,
    'Z'
  ].join(' ');
}

/**
 * Update the orange sector on the clock face.
 * @param {number} remainSecs  Seconds remaining on the countdown
 * @param {number} totalSecs   Total session duration in seconds (used to know initial mins)
 */
function drawSegment(remainSecs, totalSecs) {
  const seg = document.getElementById('timer-segment');
  if (!seg) return;

  if (remainSecs <= 0) {
    seg.setAttribute('d', '');
    return;
  }

  // Map to the 60-min clock face: (remaining seconds ÷ 60) × 6° per min
  const remainingMins = remainSecs / 60;         // e.g. 25 → 150
  const angleDeg      = remainingMins * 6;        // 1 min = 6°; 60 min = 360°

  seg.setAttribute('d', sectorPath(angleDeg));
}


/* ── 7. TIMER ENGINE ── */

/*
  Timestamp-based timer: we record when the timer started (or resumed) and
  how many seconds were left at that moment.  Each tick recomputes timerLeft
  from wall-clock time, so the timer stays accurate even when the tab is hidden.
*/

let timerLeftAtStart = 0;    // timerLeft value at that moment

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);

  // request notification permission on start
  if (Notification && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  timerRunning     = true;
  timerStartedAt   = Date.now();
  timerLeftAtStart = timerLeft;

  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - timerStartedAt) / 1000);
    timerLeft = Math.max(0, timerLeftAtStart - elapsed);

    drawSegment(timerLeft, timerTotal);

    if (timerLeft <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerRunning  = false;
      handleTimerComplete();
    }
  }, 1000);
}

  if (!Notification || Notification.permission !== 'granted') return;

}

  startTimer();
}

  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.value = 880;

    gain.gain.value = 0.2;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
  } catch (_) {}
}

  playBeep();
  alarmInterval = setInterval(playBeep, 1500);

function _beepFallback() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.45, 0.9].forEach(delay => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.8);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.8);
    });
  } catch(_) {}
}

// Elements for pause UI
const pauseWorkSlot = document.getElementById('pause-work-slot');
const workFieldGroup = document.getElementById('work-field-group');
const timerInner     = document.querySelector('.timer-screen-inner');

// Remember where the field-group lives in setup so we can return it exactly
const workFieldGroupHome   = workFieldGroup.parentNode;       // #setup-screen
const workFieldGroupSibling = workFieldGroup.nextSibling;     // node after it (break field-group)

/**
 * Toggle the pause state UI:
 *  paused=true  → clock shrinks up, real work-duration field moves into timer screen
 *  paused=false → clock restores, field returns to its original place in setup screen
 */
function setPauseUI(paused) {
  if (paused) {
    // 1. Animate clock up and smaller
    timerInner.classList.add('is-paused');

    // 2. Physically move the existing work field-group into the slot.
    //    All event listeners, validation, SVG borders, pills travel with the node — nothing duplicated.
    pauseWorkSlot.appendChild(workFieldGroup);

    // 3. Fade the slot in (rAF gives the browser one frame to register the node before transitioning)
    requestAnimationFrame(() => pauseWorkSlot.classList.add('visible'));

  } else {
    // 1. Restore clock
    timerInner.classList.remove('is-paused');

    // 2. Hide slot first, then return field-group to setup screen
    pauseWorkSlot.classList.remove('visible');

    // Return the field-group to its exact original position in the setup screen.
    // insertBefore(node, null) === appendChild, so this handles both "last child" and mid-list cases.
    workFieldGroupHome.insertBefore(workFieldGroup, workFieldGroupSibling);
  }
}

pauseBtn.addEventListener('click', () => {
  if (!isPaused) {
    pauseTimer();
    isPaused = true;
    pauseBtn.innerHTML = RESUME_ICON + ' Resume';
    setPauseUI(true);
  } else {
    isPaused = false;
    pauseBtn.innerHTML = PAUSE_ICON + ' Pause';
    setPauseUI(false);
    startTimer();
  }
});

restartBtn.addEventListener('click', () => {
  isPaused = false;
  pauseBtn.innerHTML = PAUSE_ICON + ' Pause';
  setPauseUI(false);
  restartTimer();
});


/* ── 9. SCREEN TRANSITIONS ── */
function goToTimer() {
  const secs     = workMins * 60;
  timerTotal     = secs;
  timerLeft      = secs;
  pausedDuration = secs;
  isPaused       = false;
  pauseBtn.innerHTML = PAUSE_ICON + ' Pause';
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('timer-screen').classList.remove('hidden');
  drawSegment(timerLeft, timerTotal);
  startTimer();
}

function goToSetup() {
  pauseTimer();
  isPaused = false;
  setPauseUI(false);
  document.getElementById('timer-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
}

document.getElementById('start-btn').addEventListener('click', goToTimer);
document.getElementById('back-btn').addEventListener('click', goToSetup);


/* ── 11. INIT ── */
renderWork(false);
renderBreak(false);
</script>
</body>
</html>
