<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snooze Police</title>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Prevent any page scroll — must be on BOTH html and body for all mobile browsers.
       overscroll-behavior:none kills the rubber-band bounce on iOS/Android Chrome. */
    html {
      overflow: hidden;
      height: 100%;
      overscroll-behavior: none;
    }

    :root {
      --bg: #eae4db;
      --ink: #262626;
      --white: #fafafa;
      --pink: #f5c6d2;
      --orange: #f5c08a;
      --font: 'Chakra Petch', sans-serif;
      --field-h: 77px;
      --field-inner-top: 9px;
      --field-inner-bot: 70px;
      --pill-h: 46px;
      --pill-inner-top: 1px;
      --pill-inner-bot: 41px;
    }

    body {
      background: #F5EFE7;
      font-family: var(--font);
      color: var(--ink);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none; /* blocks momentum scroll on Chrome Android without position:fixed */
    }

    /* ═══════════════════════════════════════════════════════
   SCREEN SYSTEM
═══════════════════════════════════════════════════════ */
    .app {
      width: 100%;
      max-width: 520px;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: 100%;
      padding: 52px 36px 56px;
      display: flex;
      flex-direction: column;
      position: absolute;
      transition: none;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: none;
    }

    /* ═══════════════════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════════════════ */
    .field-group {
      margin-bottom: 36px;
    }

    .field-label {
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 4px;
      display: block;
      line-height: 1.2;
    }

    .hd-shell {
      position: relative;
      height: var(--field-h);
      width: 100%;
    }

    .hd-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: block;
    }

    .hd-content {
      position: absolute;
      top: var(--field-inner-top);
      bottom: calc(var(--field-h) - var(--field-inner-bot));
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    .name-content input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1;
    }

    .name-content input::placeholder {
      color: #b0a89f;
      font-weight: 400;
    }

    .stepper-content {
      width: 100%;
      display: flex;
      align-items: center;
    }

    .stepper-btn {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 22px;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background 0.1s;
      user-select: none;
      line-height: 1;
      padding: 0;
    }

    /* Chakra Petch glyph corrections */
    .stepper-btn:first-child {
      padding-top: 2px;
    }

    /* − nudge up slightly */
    .stepper-btn:last-child {
      padding-bottom: 8px;
    }

    /* + glyph hangs low — push up harder */
    .stepper-btn:hover {
      background: rgba(38, 38, 38, 0.07);
    }

    .stepper-btn:active {
      background: rgba(38, 38, 38, 0.14);
    }

    .stepper-value {
      flex: 1;
      text-align: center;
      font-size: 17px;
      font-weight: 500;
      color: var(--ink);
      position: relative;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: text;
    }

    .stepper-value span {
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    .stepper-value input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 500;
      color: #b0a89f;
      /* starts gray, JS changes to #262626 on typing */
      text-align: center;
      display: none;
      padding: 0;
      line-height: 1;
    }

    .presets {
      display: flex;
      gap: 9px;
      margin-top: 12px;
    }

    .pill-shell {
      flex: 1;
      position: relative;
      height: var(--pill-h);
    }

    .pill-shell .hd-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: block;
    }

    .pill-shell button {
      position: absolute;
      top: var(--pill-inner-top);
      bottom: calc(var(--pill-h) - var(--pill-inner-bot));
      left: 0;
      right: 0;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 400;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: opacity 0.1s;
      z-index: 1;
    }

    .pill-shell button:active {
      opacity: 0.65;
    }

    .hint {
      font-size: 12px;
      color: #7a6e67;
      margin-top: 5px;
      padding-left: 2px;
      font-style: italic;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .hint.visible {
      opacity: 1;
    }

    /* Inline helper message — between field and pills; zero height when empty */
    .field-msg {
      font-size: 12px;
      color: #7a6e67;
      font-style: italic;
      font-family: var(--font);
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      margin: 0;
      padding: 0;
      transition: max-height 0.2s ease, opacity 0.2s ease, margin 0.2s ease;
      pointer-events: none;
    }

    .field-msg.visible {
      max-height: 30px;
      opacity: 1;
      margin-top: 6px;
      margin-bottom: 2px;
    }

    /* Disabled stepper button */
    .stepper-btn:disabled,
    .stepper-btn.disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Back button row — screen edge, clearly left of the content column */
    .timer-back-row {
      position: absolute;
      top: 44px;
      left: 18px;
    }

    .timer-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.1px;
    }

    .timer-back-btn:hover {
      opacity: 0.7;
    }

    /* ═══════════════════════════════════════════════════════
   TIMER SCREEN
═══════════════════════════════════════════════════════ */
    #timer-screen {
      padding: 0;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .timer-screen-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      /* Reduced from 80px — clock should sit higher, not float in dead space */
      padding: 44px 36px 40px;
    }

    /* Clock SVG */
    .clock-svg {
      width: 390px;
      height: 390px;
      display: block;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
        margin-bottom 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center top;
      /* No bottom margin by default */
      margin-bottom: 0;
    }

    /*
  Pause state: scale(0.72) — slightly larger than before so clock stays prominent.
  Visual height = 390 × 0.72 = 280.8px  →  dead space = 109px.
  translateY(-16px) pulls it up slightly from transform-origin:center top.
*/
    .timer-screen-inner.is-paused .clock-svg {
      transform: scale(0.72) translateY(-16px);
      margin-bottom: -109px;
    }

    /* Work duration slot: scale down a touch so the clock reads as the hero */
    .timer-screen-inner.is-paused #pause-work-slot {
      transform: scale(0.93) translateY(0);
      transform-origin: center top;
    }

    /*
  Slot that receives the real #work-field-group DOM node on pause.
  Hidden by default; fades + slides in when .visible is added.
*/
    #pause-work-slot {
      width: 100%;
      max-width: 420px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      /* No top gap — clock margin-bottom compensation handles the spacing */
      margin-top: 0;
    }

    #pause-work-slot.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* Tighten field-group when it lives inside the slot */
    #pause-work-slot .field-group {
      margin-bottom: 0;
    }

    /* Work duration field on timer screen */
    .timer-work-field {
      width: 100%;
      max-width: 420px;
      margin-top: 28px;
    }

    .timer-work-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 4px;
      display: block;
    }

    /* Mobile-only hint — hidden by default, shown via media query */
    .timer-tab-hint {
      display: none;
    }

    /* Desktop hint — always hidden; shown only on real mobile via its own media query below */
    .desktop-hint {
      display: none;
    }

    /* Show "Best experienced on desktop" only on actual mobile screens (≤ 768px) */
    @media (max-width: 768px) {
      .desktop-hint {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        font-size: 14px;
        color: #8a7e78;
        font-style: italic;
        text-align: center;
        margin-bottom: 24px;
        font-family: var(--font);
        letter-spacing: 0.1px;
      }
      .desktop-hint svg {
        flex-shrink: 0;
        opacity: 0.75;
      }
    }

    /* ── Timer buttons — clean rectangle, matches reference screenshot ── */
    .timer-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 56px;
    }

    .timer-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 56px;
      min-width: 160px;
      padding: 0 28px;
      background: #F5EDE3;
      border: 1.5px solid #d4cdc5;
      border-radius: 2px;
      box-shadow: 3px 4px 0px rgba(0, 0, 0, 0.12);
      font-family: var(--font);
      font-size: 17px;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      letter-spacing: 0.1px;
      transition: transform 0.07s, box-shadow 0.07s;
    }

    .timer-btn:hover {
      background: #ede6dc;
    }

    .timer-btn:active {
      transform: translate(2px, 3px);
      box-shadow: 1px 1px 0px rgba(0, 0, 0, 0.08);
    }

    .timer-btn svg {
      flex-shrink: 0;
    }


    /* Start button */
    .start-wrap {
      display: flex;
      justify-content: center;
      margin-top: 24px;
      padding-bottom: 4px;
    }

    .start-btn {
      position: relative;
      width: 220px;
      height: 50px;
      background: #6AADEE;
      border-radius: 2px;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 500;
      color: #1a1a1a;
      cursor: pointer;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: none;
      border-left: none;
      border-right: 2px solid #2a2a2a;
      border-bottom: 2px solid #2a2a2a;
      box-shadow: 3px 3px 0 0 #2a2a2a;
      transition: box-shadow 0.07s, transform 0.07s;
    }

    .start-btn:hover {
      background: #7abcf5;
    }

    .start-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 0 #2a2a2a;
    }

    /* ═══════════════════════════════════════════════════════
   END-OF-TIMER MODAL
═══════════════════════════════════════════════════════ */

    /* Full-screen backdrop — sits above everything */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(180, 170, 158, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      /* Hidden by default */
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Modal card */
    .modal-card {
      background: #FAFAF8;
      border: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
      border-radius: 0;
      width: min(480px, calc(100vw - 48px));
      padding: 36px 32px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      transform: translateY(12px);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .modal-backdrop.visible .modal-card {
      transform: translateY(0);
    }

    /* Cards that are buried under a newer popup — subtle 20% black tint */
    .modal-card.stacked-behind {
      filter: brightness(0.82);
      box-shadow: none !important;
      outline: 1.5px solid rgba(0,0,0,0.18);
      transition: filter 0.2s ease, box-shadow 0.2s ease;
    }

    /* Toast notification */
    .snooze-toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translate(-50%, calc(-100% - 16px));
      background: #2C2C2C;
      color: #FAFAF8;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 500;
      padding: 13px 26px;
      border-radius: 8px;
      border: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.28);
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      white-space: nowrap;
    }
    .snooze-toast.visible {
      transform: translate(-50%, 0);
    }

    .modal-heading {
      font-size: 18px;
      font-weight: 500;
      color: var(--ink);
      text-align: center;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    .modal-subtext {
      font-size: 15px;
      font-weight: 400;
      color: #5a5047;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    /* Image area */
    .modal-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 3px;
      overflow: hidden;
      background: #e8e0d8;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;   /* never stretches portrait GIFs */
      background: #000;      /* black bars fill remaining space */
      display: block;
    }

    /* Placeholder when no image */
    .modal-img-placeholder {
      font-size: 13px;
      color: #9a9188;
      font-style: italic;
    }

    /* Button row */
    .modal-btns {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
    }

    /* "Snooze" — same style as Pause/Restart */
    .modal-snooze-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 56px;
      min-width: 140px;
      padding: 0 24px;
      background: #F5EDE3;
      border: 1.5px solid #d4cdc5;
      border-radius: 2px;
      box-shadow: 3px 4px 0px rgba(0, 0, 0, 0.12);
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      letter-spacing: 0.1px;
      white-space: nowrap;
      transition: transform 0.07s, box-shadow 0.07s;
    }

    .modal-snooze-btn:hover {
      background: #ede6dc;
    }

    .modal-snooze-btn:active {
      transform: translate(2px, 3px);
      box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.08);
    }

    /* "I'll rest up" — same style as Start Session */
    .modal-rest-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      min-width: 160px;
      padding: 0 28px;
      background: #6AADEE;
      border-radius: 2px;
      border-top: none;
      border-left: none;
      border-right: 2px solid #2a2a2a;
      border-bottom: 2px solid #2a2a2a;
      box-shadow: 3px 3px 0 0 #2a2a2a;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      cursor: pointer;
      letter-spacing: 0.2px;
      white-space: nowrap;
      transition: box-shadow 0.07s, transform 0.07s;
    }

    /* Resistance level sizing for rest button */
    .modal-rest-btn.rest-lvl-1 {
      font-size: 19px;
      padding: 0 36px;
      height: 64px;
    }
    .modal-rest-btn.rest-lvl-2 {
      font-size: 21px;
      font-weight: 500;
      padding: 0 44px;
      height: 72px;
      box-shadow: 4px 4px 0 0 #2a2a2a;
    }

    @keyframes restPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }
    .rest-pulse {
      animation: restPulse 2s ease-in-out 0.6s infinite;
    }
    .rest-pulse:active {
      animation: none;
    }

    .modal-rest-btn:hover {
      background: #7abcf5;
    }

    .modal-rest-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 0 #2a2a2a;
    }

    /* ═══════════════════════════════════════════════════════
       BREAK SCREEN
    ═══════════════════════════════════════════════════════ */
    #break-screen {
      padding: 0;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .break-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: #FAFAF8;
      border-radius: 0;
      border: 2px solid #2C2C2C;
      padding: 52px 48px 48px;
      width: min(680px, calc(100vw - 48px));
      gap: 0;
    }

    .break-timer-display {
      font-size: 80px;
      font-weight: 500;
      font-family: var(--font);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 28px;
    }

    .break-copy {
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.55;
      margin-bottom: 36px;
    }

    .break-back-btn {
      position: relative;
      width: 220px;
      height: 50px;
      background: #6AADEE;
      border-radius: 2px;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 500;
      color: #1a1a1a;
      cursor: pointer;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: none;
      border-left: none;
      border-right: 2px solid #2a2a2a;
      border-bottom: 2px solid #2a2a2a;
      box-shadow: 3px 3px 0 0 #2a2a2a;
      transition: box-shadow 0.07s, transform 0.07s;
    }

    .break-back-btn:hover {
      background: #7abcf5;
    }

    .break-back-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 0 #2a2a2a;
    }

    /* When timer reaches 0, gentle pulse to nudge user back */
    .break-timer-display.break-done {
      animation: breakDonePulse 2.4s ease-in-out infinite;
    }

    @keyframes breakDonePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    /* ═══════════════════════════════════════════════════════
   MOBILE RESPONSIVE — max-width: 540px
═══════════════════════════════════════════════════════ */
    @media (max-width: 540px) {

      /*
        On mobile the .app becomes the scroll container instead of the document.
        - overflow-y:auto  → allows internal scroll when content is taller than viewport
        - overscroll-behavior:contain → scroll bounce stays inside .app, never bubbles
          to document (no rubber-band bounce on Android; iOS handles it naturally)
        - align-items:flex-start → screen flows from top; justify-content on .screen
          centres short content vertically within the available height
      */
      .app {
        align-items: flex-start;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      /*
        Screens flow normally on mobile so .app can scroll them.
        position:absolute would take them out of flow → .app scrollHeight stays
        at viewport height → nothing to scroll even when content overflows.
        min-height:100% ensures short screens still fill the full viewport.
      */
      .screen {
        position: relative;
        min-height: 100%;
        padding: 48px 24px 52px;
        justify-content: center; /* centre content when screen is taller than content */
      }

      /* Hidden screens completely removed from flow (vs. just opacity:0 on desktop) */
      .screen.hidden {
        display: none;
      }

      /* === TIMER SCREEN === */
      #timer-screen {
        padding: 0;
      }

      .timer-screen-inner {
        padding: 48px 24px 40px;
      }

      /* Back button — stay left but don't clip */
      .timer-back-row {
        top: 18px;
        left: 16px;
      }

      /* Clock SVG: shrink to fit both viewport width AND height, keep it square */
      .clock-svg {
        width: min(340px, calc(100vw - 48px), calc(100svh - 260px));
        height: min(340px, calc(100vw - 48px), calc(100svh - 260px));
      }

      /*
        Paused state: same scale(0.72) but margin-bottom recalculated for mobile clock size.
        Dead space = clock_size × (1 - 0.72) = clock_size × 0.28
        Using calc with the same formula as the width above.
      */
      .timer-screen-inner.is-paused .clock-svg {
        transform: scale(0.72) translateY(-12px);
        margin-bottom: calc(min(340px, calc(100vw - 48px), calc(100svh - 260px)) * -0.28);
      }

      /* Timer buttons — smaller on mobile */
      .timer-btns {
        margin-top: 36px;
        gap: 12px;
      }

      .timer-btn {
        min-width: 130px;
        height: 50px;
        padding: 0 20px;
        font-size: 15px;
      }

      /* === BREAK SCREEN === */
      .break-inner {
        padding: 40px 28px 36px;
        width: calc(100vw - 32px);
      }

      .break-timer-display {
        font-size: 60px;
        margin-bottom: 20px;
      }

      .break-copy {
        font-size: 16px;
        margin-bottom: 28px;
      }

      /* === MOBILE HINT === */
      .timer-tab-hint {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        font-size: 13px;
        color: #7a6e67;
        font-style: italic;
        text-align: center;
        margin-top: 20px;
        font-family: var(--font);
        letter-spacing: 0.1px;
      }

      /* === MODALS === */
      /*
        On mobile, swap from flex-center to flex-start so margin-left offset
        is measured from the left edge (not from center), preventing right-side overflow.
        With step=10px and card=calc(100vw-48px), max offset at level 3 = 30px:
        16 + 30 + (375-48) = 16 + 30 + 327 = 373px — safely within 375px.
      */
      .modal-backdrop {
        justify-content: flex-start;
        align-items: center;
        padding-left: 16px;
      }

      .modal-card {
        width: calc(100vw - 48px);
        padding: 28px 22px 24px;
        max-height: calc(100vh - 48px);
        overflow-y: auto;
      }
    }
  </style>
</head>

  <script>
    /* ═══════════════════════════════════════════════════════
       SNOOZE POLICE — script.js
    ═══════════════════════════════════════════════════════ */

    /* ── 1. SVG INJECTION ── */
    const borderTpl = document.getElementById('tpl-border');
    const pillTpl = document.getElementById('tpl-pill');

    function injectBorder(id) {
      const el = document.getElementById(id);
      if (!el || !borderTpl) return;
      el.insertBefore(borderTpl.content.cloneNode(true), el.firstChild);
    }
    function injectPill(id) {
      const el = document.getElementById(id);
      if (!el || !pillTpl) return;
      el.insertBefore(pillTpl.content.cloneNode(true), el.firstChild);
    }

    injectBorder('name-shell');
    injectBorder('work-shell');
    injectBorder('break-shell');

    ['wp0', 'wp1', 'wp2'].forEach(injectPill);


    /* ── 2. SHARED STATE ── */
    let workMins = 25;  // 1–60
    let breakMins = 5;   // 3–15

    const WK_MIN = 1, WK_MAX = 60, WK_STEP = 1;
    const BK_MIN = 3, BK_MAX = 15, BK_STEP = 1;

    // Timer
    let timerTotal = 25 * 60;
    let timerLeft = 25 * 60;
    let timerRunning = false;
    let timerRAF = null;   // requestAnimationFrame handle — replaces setInterval for clock updates
    let pausedDuration = 25 * 60;

    // Snooze resistance
    let snoozeCount = 0;
    let hasUsedFullResistance = false;
    let modalStack = []; // tracks cards for stacked-card push-back effect


    /* ── 3. UTILITIES ── */
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    function fmtMins(m) { return m === 1 ? '1 min' : `${m} mins`; }

    // Show a transient helper message in a .field-msg element.
    // Disappears after `delay` ms (default 2500) or on next interaction.
    let _msgTimers = {};
    function showMsg(elId, text, delay = 2500) {
      const el = document.getElementById(elId);
      if (!el) return;
      clearTimeout(_msgTimers[elId]);
      el.textContent = text;
      el.classList.add('visible');
      _msgTimers[elId] = setTimeout(() => {
        el.classList.remove('visible');
      }, delay);
    }
    function clearMsg(elId) {
      const el = document.getElementById(elId);
      if (!el) return;
      clearTimeout(_msgTimers[elId]);
      el.classList.remove('visible');
    }

    // Update disabled visual state of +/- buttons
    function updateStepperState(minusId, plusId, value, min, max) {
      const minus = document.getElementById(minusId);
      const plus = document.getElementById(plusId);
      if (!minus || !plus) return;

      if (value <= min) {
        minus.classList.add('disabled');
        minus.setAttribute('aria-disabled', 'true');
      } else {
        minus.classList.remove('disabled');
        minus.removeAttribute('aria-disabled');
      }

      if (value >= max) {
        plus.classList.add('disabled');
        plus.setAttribute('aria-disabled', 'true');
      } else {
        plus.classList.remove('disabled');
        plus.removeAttribute('aria-disabled');
      }
    }

    // Sync pill fill colours
    function syncPills(groupId, currentMins) {
      document.querySelectorAll(`#${groupId} .pill-shell`).forEach(shell => {
        const btn = shell.querySelector('button');
        const active = Number(btn.dataset.mins) === currentMins;
        btn.classList.toggle('active', active);
        const fp = shell.querySelector('.pill-fill-path');
        if (fp) fp.setAttribute('fill', active ? '#f5c6d2' : '#FAFAFA');
      });
    }


    /* ── 4. WORK DURATION ── */
    const workDisplay = document.getElementById('work-display');
    const workInput = document.getElementById('work-input');

    function renderWork(userChanged = false) {
      workDisplay.textContent = fmtMins(workMins);
      workDisplay.style.color = userChanged ? '#262626' : '';
      syncPills('work-presets', workMins);
      updateStepperState('work-minus', 'work-plus', workMins, WK_MIN, WK_MAX);

      // While paused on the timer screen, only reset the timer if the user explicitly
      // changed the duration — keeps resume-from-position intact otherwise.
      if (isPaused && userChanged) {
        timerTotal = workMins * 60;
        timerLeft = workMins * 60;
        drawSegment(timerLeft, timerTotal);
      }
    }

    // Stepper ±1 min — works even when input is in edit mode (mousedown logic)
    document.getElementById('work-minus').addEventListener('click', () => {
      if (workMins <= WK_MIN) {
        showMsg('work-msg', `Min work duration is 1 min`);
        return;
      }
      workMins = clamp(workMins - WK_STEP, WK_MIN, WK_MAX);
      clearMsg('work-msg');
      if (wEditing) { workInput.value = String(workMins); workInput.style.color = '#262626'; }
      renderWork(true);
    });

    document.getElementById('work-plus').addEventListener('click', () => {
      if (workMins >= WK_MAX) {
        showMsg('work-msg', `Max work duration is 60 mins`);
        return;
      }
      workMins = clamp(workMins + WK_STEP, WK_MIN, WK_MAX);
      clearMsg('work-msg');
      if (wEditing) { workInput.value = String(workMins); workInput.style.color = '#262626'; }
      renderWork(true);
    });

    // Prevent mousedown from blurring input when stepper btns clicked
    document.getElementById('work-minus').addEventListener('mousedown', e => e.preventDefault());
    document.getElementById('work-plus').addEventListener('mousedown', e => e.preventDefault());

    // Arrow key support on the stepper value area (works in both display and edit mode)
    document.getElementById('work-val').addEventListener('keydown', e => {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        document.getElementById('work-plus').click();
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        document.getElementById('work-minus').click();
      }
    });

    // Make the value area keyboard-focusable so arrow keys work without clicking first
    document.getElementById('work-val').setAttribute('tabindex', '0');

    // Click-to-edit
    let wEditing = false;

    document.getElementById('work-val').addEventListener('click', () => {
      if (wEditing) return;
      wEditing = true;
      workDisplay.style.display = 'none';
      workInput.style.display = 'block';
      workInput.value = String(workMins);
      workInput.style.color = '#b0a89f';
      workInput.focus();
      workInput.select();
    });

    workInput.addEventListener('input', () => {
      workInput.value = workInput.value.replace(/\D/g, '');
      workInput.style.color = '#262626';
      clearMsg('work-msg');
    });

    workInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); workInput.blur(); }
      if (e.key === 'Escape') { wEditing = false; _cancelWork(); }
    });

    function commitWork() {
      if (!wEditing) return;
      wEditing = false;
      workInput.style.display = 'none';
      workDisplay.style.display = '';
      const raw = parseInt(workInput.value, 10);
      if (!isNaN(raw)) {
        if (raw === 0) {
          workMins = WK_MIN;
          showMsg('work-msg', `Min work duration is 1 min`);
        } else if (raw > WK_MAX) {
          workMins = WK_MAX;
          showMsg('work-msg', `Max work duration is 60 mins`);
        } else {
          workMins = raw;
        }
      }
      renderWork(true);
    }
    function _cancelWork() {
      workInput.style.display = 'none';
      workDisplay.style.display = '';
      renderWork(false);
    }
    workInput.addEventListener('blur', commitWork);

    // Presets
    document.querySelectorAll('#work-presets .preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        workMins = Number(btn.dataset.mins);
        if (wEditing) { wEditing = false; workInput.style.display = 'none'; workDisplay.style.display = ''; }
        clearMsg('work-msg');
        renderWork(true);
      });
    });


    /* ── 5. BREAK DURATION ── */
    const breakDisplay = document.getElementById('break-display');
    const breakInput = document.getElementById('break-input');

    function renderBreak(userChanged = false) {
      breakDisplay.textContent = fmtMins(breakMins);
      breakDisplay.style.color = userChanged ? '#262626' : '';
      updateStepperState('break-minus', 'break-plus', breakMins, BK_MIN, BK_MAX);
    }

    document.getElementById('break-minus').addEventListener('click', () => {
      if (breakMins <= BK_MIN) {
        showMsg('break-msg', `Min break duration is 3 mins`);
        return;
      }
      breakMins = clamp(breakMins - BK_STEP, BK_MIN, BK_MAX);
      clearMsg('break-msg');
      if (bEditing) { breakInput.value = String(breakMins); breakInput.style.color = '#262626'; }
      renderBreak(true);
    });

    document.getElementById('break-plus').addEventListener('click', () => {
      if (breakMins >= BK_MAX) {
        showMsg('break-msg', `Max break duration is 15 mins`);
        return;
      }
      breakMins = clamp(breakMins + BK_STEP, BK_MIN, BK_MAX);
      clearMsg('break-msg');
      if (bEditing) { breakInput.value = String(breakMins); breakInput.style.color = '#262626'; }
      renderBreak(true);
    });

    document.getElementById('break-minus').addEventListener('mousedown', e => e.preventDefault());
    document.getElementById('break-plus').addEventListener('mousedown', e => e.preventDefault());

    document.getElementById('break-val').setAttribute('tabindex', '0');
    document.getElementById('break-val').addEventListener('keydown', e => {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        document.getElementById('break-plus').click();
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        document.getElementById('break-minus').click();
      }
    });

    let bEditing = false;

    document.getElementById('break-val').addEventListener('click', () => {
      if (bEditing) return;
      bEditing = true;
      breakDisplay.style.display = 'none';
      breakInput.style.display = 'block';
      breakInput.value = String(breakMins);
      breakInput.style.color = '#b0a89f';
      breakInput.focus();
      breakInput.select();
    });

    breakInput.addEventListener('input', () => {
      breakInput.value = breakInput.value.replace(/\D/g, '');
      breakInput.style.color = '#262626';
      clearMsg('break-msg');
    });

    breakInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); breakInput.blur(); }
      if (e.key === 'Escape') { bEditing = false; _cancelBreak(); }
    });

    function commitBreak() {
      if (!bEditing) return;
      bEditing = false;
      breakInput.style.display = 'none';
      breakDisplay.style.display = '';
      const raw = parseInt(breakInput.value, 10);
      if (!isNaN(raw)) {
        if (raw < BK_MIN) {
          breakMins = BK_MIN;
          showMsg('break-msg', `Min break duration is 3 mins`);
        } else if (raw > BK_MAX) {
          breakMins = BK_MAX;
          showMsg('break-msg', `Max break duration is 15 mins`);
        } else {
          breakMins = raw;
        }
      }
      renderBreak(true);
    }
    function _cancelBreak() {
      breakInput.style.display = 'none';
      breakDisplay.style.display = '';
      renderBreak(false);
    }
    breakInput.addEventListener('blur', commitBreak);


    /* ── 6. CLOCK SECTOR DRAWING ── */
    /*
      The orange shape is a FILLED PIE SLICE (sector) drawn with an SVG path.
    
      Clock geometry:
        Center:  CX=277.113, CY=276.573  (clock hand pivot, from SVG)
        Radius:  R=200  (reaches just inside the decorative ring border)
    
      Coordinate system reminder (SVG):
        - x increases RIGHT
        - y increases DOWN (opposite of standard math)
        - "12 o'clock" top = (CX, CY - R)
    
      Sector start: always 12 o'clock (top of clock), fixed.
      Sector sweeps: ANTI-CLOCKWISE by `angleDeg`.
    
      Anti-clockwise in SVG screen space = sweep-flag 0.
    
      Point on circle at angle θ anti-clockwise from 12 o'clock:
        x = CX - R × sin(θ)      ← negative sin moves LEFT (anti-clockwise)
        y = CY - R × cos(θ)      ← minus cos: at θ=0 gives top (CY-R); at θ=180 gives bottom (CY+R)
    
      SVG arc path for the sector:
        M CX CY               — move to center
        L startX startY        — line to 12 o'clock (start of arc)
        A R R 0 largeArc 0     — arc, counter-clockwise (sweep=0)
          endX endY            —   to end point
        Z                      — close back to center
    
      large-arc-flag = 1 when angleDeg > 180°, else 0.
    
      Timer countdown mapping:
        Full 60-min clock face = 360°.
        Remaining time in seconds → remaining minutes → degrees.
        angleDeg = (timerLeft / 60) × 6     (since 1 min = 6°)
    */

    // R = 165: outer edge sits at the digit/tick-mark ring, not the full face border
    const CX = 277.113, CY = 276.573, R = 165;

    /**
     * Build an SVG 'd' string for a pie sector.
     * @param {number} angleDeg  Arc span in degrees (0 = nothing, 360 = full circle)
     * @returns {string} SVG path data
     */
    function sectorPath(angleDeg) {
      if (angleDeg <= 0) return '';

      // Full circle: SVG can't draw a 360° arc in one command,
      // so we use a well-known trick — two 180° arcs joined.
      if (angleDeg >= 359.99) {
        return [
          `M ${CX} ${CY}`,
          `L ${CX} ${(CY - R).toFixed(3)}`,
          `A ${R} ${R} 0 1 0 ${CX} ${(CY + R).toFixed(3)}`,  // top → bottom (CW half)
          `A ${R} ${R} 0 1 0 ${CX} ${(CY - R).toFixed(3)}`,  // bottom → top (CW half)
          'Z'
        ].join(' ');
      }

      const θ = angleDeg * Math.PI / 180;

      // 12 o'clock — fixed start of the sector
      const startX = CX;
      const startY = CY - R;

      // End of arc, swept anti-clockwise by θ from 12 o'clock
      const endX = CX - R * Math.sin(θ);
      const endY = CY - R * Math.cos(θ);

      // large-arc-flag: 1 if the arc spans more than a semicircle
      const largeArc = angleDeg > 180 ? 1 : 0;

      return [
        `M ${CX} ${CY}`,
        `L ${startX.toFixed(3)} ${startY.toFixed(3)}`,
        `A ${R} ${R} 0 ${largeArc} 0 ${endX.toFixed(3)} ${endY.toFixed(3)}`,
        'Z'
      ].join(' ');
    }

    /**
     * Update the orange sector on the clock face.
     * @param {number} remainSecs  Seconds remaining on the countdown
     * @param {number} totalSecs   Total session duration in seconds (used to know initial mins)
     */
    function drawSegment(remainSecs, totalSecs) {
      const seg = document.getElementById('timer-segment');
      if (!seg) return;

      if (remainSecs <= 0) {
        seg.setAttribute('d', '');
        return;
      }

      // Map to the 60-min clock face: (remaining seconds ÷ 60) × 6° per min
      const remainingMins = remainSecs / 60;         // e.g. 25 → 150
      const angleDeg = remainingMins * 6;        // 1 min = 6°; 60 min = 360°

      seg.setAttribute('d', sectorPath(angleDeg));
    }


    /* ── 7. TIMER ENGINE ── */

    let timerStartedAt = null;
    let timerLeftAtStart = 0;
    let notificationShown = false;
    let timerCompletedAt = null;

    /*
      Web Worker backup timer — fires handleTimerComplete() even in background tabs.
      Workers run in a separate thread and are NOT subject to Chrome's "intensive
      throttling" that kills main-thread setTimeout in background tabs after 5 min.
      We create the worker from a Blob so the entire app stays a single HTML file.
    */
    const _workerCode = `
      var t = null;
      self.onmessage = function(e) {
        if (e.data.type === 'start') {
          clearTimeout(t);
          t = setTimeout(function() { self.postMessage({ type: 'done' }); }, e.data.ms);
        } else if (e.data.type === 'stop') {
          clearTimeout(t);
          t = null;
        }
      };
    `;
    const timerWorker = new Worker(
      URL.createObjectURL(new Blob([_workerCode], { type: 'text/javascript' }))
    );
    timerWorker.onmessage = (e) => {
      if (e.data.type !== 'done') return;
      if (!timerRunning) return; // rAF already handled it
      timerRunning = false;
      cancelAnimationFrame(timerRAF); timerRAF = null;
      stopAudioKeepalive();
      handleTimerComplete();
    };

    /* Silent-audio keepalive — keeps AudioContext "playing" so Android Chrome
       doesn't suspend it when the tab is backgrounded.
       iOS will still kill background audio; nothing we can do about that. */
    let keepAliveOsc = null;
    let keepAliveGain = null;

    function startAudioKeepalive() {
      if (!alarmCtx || keepAliveOsc) return;
      try {
        if (alarmCtx.state === 'suspended') alarmCtx.resume();
        keepAliveGain = alarmCtx.createGain();
        keepAliveGain.gain.value = 0.0001; // –80 dB — completely inaudible
        keepAliveOsc = alarmCtx.createOscillator();
        keepAliveOsc.frequency.value = 1; // 1 Hz sub-audible
        keepAliveOsc.connect(keepAliveGain);
        keepAliveGain.connect(alarmCtx.destination);
        keepAliveOsc.start();
      } catch (e) { /* non-critical */ }
    }

    function stopAudioKeepalive() {
      try { if (keepAliveOsc) { keepAliveOsc.stop(); keepAliveOsc.disconnect(); } } catch(e) {}
      try { if (keepAliveGain) keepAliveGain.disconnect(); } catch(e) {}
      keepAliveOsc = null;
      keepAliveGain = null;
    }

    /*
      tick() is defined in outer scope (not inside startTimer) so the
      visibilitychange handler can re-queue it after returning from background —
      iOS Safari does not always auto-resume a paused rAF loop on tab return.
    */
    function tick() {
      if (!timerRunning) return;

      const elapsed = Math.floor((Date.now() - timerStartedAt) / 1000);
      const newLeft = Math.max(0, timerLeftAtStart - elapsed);

      // Only redraw when the second ticks — avoids redundant DOM writes at 60fps
      if (newLeft !== timerLeft) {
        timerLeft = newLeft;
        drawSegment(timerLeft, timerTotal);

        if (timerLeft <= 0) {
          timerRAF = null;
          timerRunning = false;
          timerWorker.postMessage({ type: 'stop' }); // cancel backup — we're handling it
          stopAudioKeepalive();
          handleTimerComplete();
          return;
        }
      }

      timerRAF = requestAnimationFrame(tick);
    }

    function startTimer() {
      if (timerRAF) cancelAnimationFrame(timerRAF);
      timerWorker.postMessage({ type: 'stop' }); // cancel any previous backup

      if (Notification && Notification.permission === 'default') {
        Notification.requestPermission();
      }

      timerRunning = true;
      timerStartedAt = Date.now();
      timerLeftAtStart = timerLeft;
      notificationShown = false;

      // rAF: smooth visual updates at 60fps when tab is active
      timerRAF = requestAnimationFrame(tick);

      // Backup worker timer: fires handleTimerComplete even when rAF is paused.
      // Web Workers are NOT subject to Chrome's "intensive throttling" in background
      // tabs — unlike main-thread setTimeout, they fire accurately at any time.
      // +500ms so rAF gets first shot when the tab is active.
      timerWorker.postMessage({ type: 'start', ms: timerLeft * 1000 + 500 });

      // Keep AudioContext alive so Android Chrome can play the alarm while backgrounded.
      // We create alarmCtx here too — startTimer is always called from a click handler
      // so we're guaranteed to be inside a user gesture, satisfying autoplay policy.
      // (The document-level unlockAudio listener fires in the bubble phase, AFTER this
      //  code, so we can't rely on it having run yet.)
      if (!alarmCtx) {
        alarmCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      startAudioKeepalive();
    }

    function pauseTimer() {
      if (timerRAF) { cancelAnimationFrame(timerRAF); timerRAF = null; }
      timerWorker.postMessage({ type: 'stop' });
      stopAudioKeepalive();
      timerRunning = false;
    }

    function restartTimer() {
      pauseTimer();
      timerLeft = timerTotal;
      drawSegment(timerLeft, timerTotal);
      startTimer();
    }


    /* ── 8. ALARM & NOTIFICATIONS ── */

    let alarmCtx = null;
    let alarmActive = false;
    let alarmTimeout = null;

    // Create AudioContext on first interaction to satisfy autoplay policy.
    document.addEventListener('click', function unlockAudio() {
      if (!alarmCtx) {
        alarmCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }, { once: true });

    // Plays a single clean sine-wave beep (250ms, soft attack/release — no clicks).
    function beep() {
      if (!alarmCtx) alarmCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (alarmCtx.state === 'suspended') alarmCtx.resume();

      const osc  = alarmCtx.createOscillator();
      const gain = alarmCtx.createGain();
      osc.connect(gain);
      gain.connect(alarmCtx.destination);

      osc.type = 'sine';
      osc.frequency.value = 880;   // A5 — clean timer-like tone

      const t = alarmCtx.currentTime;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.01);  // 10ms attack
      gain.gain.setValueAtTime(0.35, t + 0.23);
      gain.gain.linearRampToValueAtTime(0, t + 0.25);     // 20ms release

      osc.start(t);
      osc.stop(t + 0.25);   // self-cleans up, no abrupt cut
    }

    // Pattern: beep(250ms) → pause(800ms) → beep(250ms) → pause(2000ms) → repeat
    function startAlarm() {
      if (alarmActive) return;
      alarmActive = true;
      if (!alarmCtx) alarmCtx = new (window.AudioContext || window.webkitAudioContext)();

      function runPattern() {
        if (!alarmActive) return;
        if (alarmCtx.state === 'suspended') alarmCtx.resume();

        beep();
        alarmTimeout = setTimeout(() => {
          if (!alarmActive) return;
          beep();
          alarmTimeout = setTimeout(runPattern, 2250); // 250ms beep + 2000ms pause
        }, 1050); // 250ms beep + 800ms pause
      }

      runPattern();
    }

    function stopAlarm() {
      alarmActive = false;
      clearTimeout(alarmTimeout);
      alarmTimeout = null;
      // AudioContext keeps running (cheap to leave idle); oscillators self-terminate.
    }

    function showNotification() {
      if (!Notification || Notification.permission !== 'granted') return;

      const n = new Notification("Time's up", {
        body: "Go stretch. You earned it."
      });

      n.onclick = () => {
        window.focus();
        openDoneModal();
      };
    }

    function openDoneModal() {
      const modal = document.getElementById('done-modal');
      if (modal) {
        modal.classList.add('visible');
      }
    }

    function handleTimerComplete() {
      timerCompletedAt = Date.now(); // mark so visibilitychange can re-fire on return
      startAlarm();

      if (!notificationShown) {
        showNotification();
        notificationShown = true;
      }

      // Show modal reliably, regardless of visibilityState
      openDoneModal();
    }

    // "I'll rest up" — stop alarm, close everything, go to break/setup
    const modalRestBtn = document.getElementById('modal-rest-btn');
    if (modalRestBtn) {
      modalRestBtn.addEventListener('click', () => {
        stopAlarm();
        closeAllModals();
        if (typeof goToBreak === 'function') {
          goToBreak();
        } else if (typeof goToSetup === 'function') {
          goToSetup();
        }
      });
    }

    // "Snooze" — stop alarm immediately, then enter resistance flow
    const modalSnoozeBtn = document.getElementById('modal-snooze-btn');
    if (modalSnoozeBtn) {
      modalSnoozeBtn.addEventListener('click', () => {
        stopAlarm();

        if (hasUsedFullResistance) {

        } else {
          showResistanceModal(1);
        }
      });
    }

    function pickRandom(arr) {

    function closeAllModals() {
      const done = document.getElementById('done-modal');
      if (done) done.classList.remove('visible');
      document.querySelectorAll('.resistance-modal').forEach(m => m.remove());

      const doneCard = document.querySelector('#done-modal .modal-card');

      closeAllModals();
      hasUsedFullResistance = true;

      timerLeft = 5 * 60;
      drawSegment(timerLeft, timerTotal);

    // Existing cards shift UP-LEFT so the new card appears bottom-right of the stack.

    function nudgeCardsBack() {
      const allCards = [
        document.querySelector('#done-modal .modal-card'),
        ...modalStack.map(({ card }) => card)
      ].filter(Boolean);
      allCards.forEach(card => {
        const x = Number(card.dataset.stackX || 0) + STACK_DX;
        const y = Number(card.dataset.stackY || 0) + STACK_DY;
        card.dataset.stackX = x; card.dataset.stackY = y;
        // Instant — no transition, old cards don't animate
        card.style.transition = 'none';
        card.style.transform = `translate(${x}px, ${y}px)`;
      });
    }

      const category = level === 1 ? 'first' : level === 2 ? 'second' : 'postSnooze';

      // Button styling: levels 1/2 use rest-lvl-1 or rest-lvl-2; post-snooze reuses rest-lvl-2

    /* ── Page Visibility API ──
       Two cases when the user returns to this tab:

       A) timerRunning=true  → the interval was throttled while hidden, timer never
          finished in JS. Recompute from wall-clock; if time is up, fire completion.

       B) timerRunning=false + timerCompletedAt set → timer DID finish while hidden
          (interval ran, timerRunning=false), but audio was likely silenced by the OS.
          Re-open the modal and restart the alarm now that we're foregrounded again.
    */
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') return;

      // Try to unblock the AudioContext the moment the tab comes back — works on
      // Android; on iOS a tap is still needed but the modal gives them that tap.
      if (alarmCtx && alarmCtx.state === 'suspended') alarmCtx.resume();

      if (timerRunning) {
        // Case A: resync from wall clock, then re-queue rAF loop.
        // iOS does not reliably auto-resume a paused rAF on tab return —
        // we must explicitly re-queue tick() here.
        const elapsed = Math.floor((Date.now() - timerStartedAt) / 1000);
        timerLeft = Math.max(0, timerLeftAtStart - elapsed);
        drawSegment(timerLeft, timerTotal);
        if (timerLeft <= 0) {
          cancelAnimationFrame(timerRAF); timerRAF = null;
          timerWorker.postMessage({ type: 'stop' });
          timerRunning = false;
          stopAudioKeepalive();
          handleTimerComplete();
        } else {
          // Re-queue the tick loop — safe even if it was already running
          cancelAnimationFrame(timerRAF);
          timerRAF = requestAnimationFrame(tick);
          startAudioKeepalive(); // re-attach keepalive if it dropped
        }
      } else if (timerCompletedAt !== null) {
        // Case B: timer already done, re-fire alarm + ensure modal is visible
        if (!alarmActive) startAlarm();
        openDoneModal();
      }
    });

    /* ── playDone kept for backwards compat (now wraps openDoneModal) ── */

    /* ── 8. PAUSE / RESUME / RESTART ── */
    const pauseBtn = document.getElementById('pause-btn');
    const restartBtn = document.getElementById('restart-btn');

    let isPaused = false;

    /* Handdrawn-style icons — match the uploaded SVGs exactly */
    const PAUSE_ICON = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2.5" y="1.5" width="3.5" height="13" rx="1.5" fill="#2C2C2C"/><rect x="10" y="1.5" width="3.5" height="13" rx="1.5" fill="#2C2C2C"/></svg>`;
    const RESUME_ICON = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.2067 13.1084C5.1215 11.9595 5.05502 8.48522 5.0223 5.47443C5.00554 3.9325 6.67859 2.95639 8.03719 3.68578C10.8063 5.17239 14.6841 7.14098 18.5 8.77637C23.3274 10.8453 15.1152 16.9156 8.48231 20.8524C7.16026 21.6371 5.52807 20.6368 5.53407 19.0995C5.53734 18.2642 5.53197 17.5583 5.52209 17.0242C5.45851 15.5191 5.37395 14.5034 5.2067 13.1084Z" stroke="#262626" stroke-width="5" stroke-linecap="round"/></svg>`;

    // Elements for pause UI
    const pauseWorkSlot = document.getElementById('pause-work-slot');
    const workFieldGroup = document.getElementById('work-field-group');
    const timerInner = document.querySelector('.timer-screen-inner');

    // Remember where the field-group lives in setup so we can return it exactly
    const workFieldGroupHome = workFieldGroup.parentNode;       // #setup-screen
    const workFieldGroupSibling = workFieldGroup.nextSibling;     // node after it (break field-group)

    /**
     * Toggle the pause state UI:
     *  paused=true  → clock shrinks up, real work-duration field moves into timer screen
     *  paused=false → clock restores, field returns to its original place in setup screen
     */
    function setPauseUI(paused) {
      if (paused) {
        // 1. Animate clock up and smaller
        timerInner.classList.add('is-paused');

        // Sync workMins to remaining time, ceiling to nearest whole minute.
        // e.g. 43 secs left → 1 min; 2m 10s left → 3 mins.
        // Resuming uses timerLeft directly so the actual countdown is unaffected.
        workMins = Math.max(WK_MIN, Math.ceil(timerLeft / 60));
        renderWork(false);

        // 2. Physically move the existing work field-group into the slot.
        //    All event listeners, validation, SVG borders, pills travel with the node — nothing duplicated.
        pauseWorkSlot.appendChild(workFieldGroup);

        // 3. Fade the slot in (rAF gives the browser one frame to register the node before transitioning)
        requestAnimationFrame(() => pauseWorkSlot.classList.add('visible'));

      } else {
        // 1. Restore clock
        timerInner.classList.remove('is-paused');

        // 2. Hide slot first, then return field-group to setup screen
        pauseWorkSlot.classList.remove('visible');

        // Return the field-group to its exact original position in the setup screen.
        // insertBefore(node, null) === appendChild, so this handles both "last child" and mid-list cases.
        workFieldGroupHome.insertBefore(workFieldGroup, workFieldGroupSibling);
      }
    }

    pauseBtn.addEventListener('click', () => {
      if (!isPaused) {
        pauseTimer();
        isPaused = true;
        pauseBtn.innerHTML = RESUME_ICON + ' Resume';
        setPauseUI(true);
      } else {
        isPaused = false;
        pauseBtn.innerHTML = PAUSE_ICON + ' Pause';
        setPauseUI(false);
        startTimer();
      }
    });

    restartBtn.addEventListener('click', () => {
      isPaused = false;
      pauseBtn.innerHTML = PAUSE_ICON + ' Pause';
      setPauseUI(false);
      restartTimer();
    });


    /* ── 9. SCREEN TRANSITIONS ── */

    /* ── BREAK SCREEN ── */
    let breakInterval = null;
    let breakLeft = 0;

    function fmtTime(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function goToBreak() {
      stopAlarm();
      closeAllModals();
      pauseTimer();
      isPaused = false;
      setPauseUI(false);

      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('timer-screen').classList.add('hidden');
      document.getElementById('break-screen').classList.remove('hidden');

      // Reset display
      const display = document.getElementById('break-timer-display');
      display.classList.remove('break-done');
      breakLeft = breakMins * 60;
      display.textContent = fmtTime(breakLeft);

      // Start break countdown
      if (breakInterval) clearInterval(breakInterval);
      breakInterval = setInterval(() => {
        breakLeft = Math.max(0, breakLeft - 1);
        display.textContent = fmtTime(breakLeft);
        if (breakLeft <= 0) {
          clearInterval(breakInterval);
          breakInterval = null;
          // Timer hit 0 — pulse display to nudge user, but don't auto-navigate
          display.classList.add('break-done');
        }
      }, 1000);
    }

    document.getElementById('break-back-btn').addEventListener('click', () => {
      if (breakInterval) { clearInterval(breakInterval); breakInterval = null; }
      document.getElementById('break-screen').classList.add('hidden');
      goToSetup();
    });

    function goToTimer() {
      const secs = workMins * 60;
      timerTotal = secs;
      timerLeft = secs;
      pausedDuration = secs;
      isPaused = false;
      snoozeCount = 0;
      hasUsedFullResistance = false;
      timerCompletedAt = null;
      timerWorker.postMessage({ type: 'stop' });
      pauseBtn.innerHTML = PAUSE_ICON + ' Pause';
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('timer-screen').classList.remove('hidden');
      drawSegment(timerLeft, timerTotal);
      startTimer();
    }

    function goToSetup() {
      pauseTimer();
      isPaused = false;
      setPauseUI(false);
      document.getElementById('timer-screen').classList.add('hidden');
      document.getElementById('break-screen').classList.add('hidden');
      document.getElementById('setup-screen').classList.remove('hidden');
    }

    document.getElementById('start-btn').addEventListener('click', () => {
      const nameVal = document.getElementById('name-input').value.trim();
      if (!nameVal) {
        showMsg('name-msg', 'I need your name to get started.', 99999);
        document.getElementById('name-input').focus();
        return;
      }
      clearMsg('name-msg');
      goToTimer();
    });

    // Clear the error as soon as they start typing
    document.getElementById('name-input').addEventListener('input', () => clearMsg('name-msg'));
    document.getElementById('back-btn').addEventListener('click', goToSetup);


    /* ── 11. INIT ── */
    renderWork(false);
    renderBreak(false);
  </script>
</body>

</html>
