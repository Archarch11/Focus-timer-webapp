<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snooze Police</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #eae4db;
  --ink: #262626;
  --white: #fafafa;
  --pink: #f5c6d2;
  --orange: #f5c08a;
  --font: 'Chakra Petch', sans-serif;
  --field-h: 77px;
  --field-inner-top: 9px;
  --field-inner-bot: 70px;
  --pill-h: 46px;
  --pill-inner-top: 1px;
  --pill-inner-bot: 41px;
}

body {
  background: #F5EFE7;
  font-family: var(--font);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════
   SCREEN SYSTEM
═══════════════════════════════════════════════════════ */
.app {
  width: 100%;
  max-width: 520px;
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen {
  width: 100%;
  padding: 52px 36px 56px;
  display: flex;
  flex-direction: column;
  position: absolute;
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateX(40px);
}

/* ═══════════════════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════════════════ */
.field-group { margin-bottom: 36px; }

.field-label {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
  display: block;
  line-height: 1.2;
}

.hd-shell {
  position: relative;
  height: var(--field-h);
  width: 100%;
}
.hd-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  display: block;
}
.hd-content {
  position: absolute;
  top: var(--field-inner-top);
  bottom: calc(var(--field-h) - var(--field-inner-bot));
  left: 0; right: 0;
  display: flex;
  align-items: center;
  padding: 0 16px;
}

.name-content input {
  width: 100%;
  background: transparent;
  border: none; outline: none;
  font-family: var(--font);
  font-size: 17px; font-weight: 500; color: var(--ink);
  line-height: 1;
}
.name-content input::placeholder { color: #b0a89f; font-weight: 400; }

.stepper-content { width: 100%; display: flex; align-items: center; }

.stepper-btn {
  width: 36px; height: 36px; flex-shrink: 0;
  border: none; background: transparent;
  font-family: var(--font); font-size: 22px; color: var(--ink);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; transition: background 0.1s;
  user-select: none; line-height: 1; padding: 0;
}
/* Chakra Petch glyph corrections */
.stepper-btn:first-child { padding-top: 2px; }    /* − nudge up slightly */
.stepper-btn:last-child  { padding-bottom: 8px; } /* + glyph hangs low — push up harder */
.stepper-btn:hover  { background: rgba(38,38,38,0.07); }
.stepper-btn:active { background: rgba(38,38,38,0.14); }

.stepper-value {
  flex: 1; text-align: center;
  font-size: 17px; font-weight: 500; color: var(--ink);
  position: relative; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: text;
}
.stepper-value span { pointer-events: none; user-select: none; line-height: 1; }
.stepper-value input {
  position: absolute; inset: 0; width: 100%; height: 100%;
  background: transparent; border: none; outline: none;
  font-family: var(--font); font-size: 17px; font-weight: 500;
  color: #b0a89f; /* starts gray, JS changes to #262626 on typing */
  text-align: center; display: none; padding: 0; line-height: 1;
}

.presets { display: flex; gap: 9px; margin-top: 12px; }
.pill-shell { flex: 1; position: relative; height: var(--pill-h); }
.pill-shell .hd-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; display: block; }
.pill-shell button {
  position: absolute;
  top: var(--pill-inner-top);
  bottom: calc(var(--pill-h) - var(--pill-inner-bot));
  left: 0; right: 0;
  border: none; background: transparent;
  font-family: var(--font); font-size: 17px; font-weight: 400; color: var(--ink);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1; transition: opacity 0.1s; z-index: 1;
}
.pill-shell button:active { opacity: 0.65; }

.hint {
  font-size: 12px; color: #7a6e67;
  margin-top: 5px; padding-left: 2px; font-style: italic;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.hint.visible { opacity: 1; }

/* Inline helper message — between field and pills; zero height when empty */
.field-msg {
  font-size: 12px;
  color: #7a6e67;
  font-style: italic;
  font-family: var(--font);
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  margin: 0;
  padding: 0;
  transition: max-height 0.2s ease, opacity 0.2s ease, margin 0.2s ease;
  pointer-events: none;
}
.field-msg.visible {
  max-height: 30px;
  opacity: 1;
  margin-top: 6px;
  margin-bottom: 2px;
}

/* Disabled stepper button */
.stepper-btn:disabled,
.stepper-btn.disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Back button row on timer screen */
.timer-back-row {
  width: 100%;
  margin-bottom: 8px;
}
.timer-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border: none;
  background: transparent;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  padding: 4px 0;
  opacity: 0.65;
  transition: opacity 0.15s;
}
.timer-back-btn:hover { opacity: 1; }

/* Start button */
.start-wrap { display: flex; justify-content: center; margin-top: 24px; /* extra room for shadow */ padding-bottom: 4px; }
.start-btn {
  position: relative;
  width: 220px; height: 50px;
  background: #6AADEE;
  border-radius: 2px;
  font-family: var(--font); font-size: 17px; font-weight: 500; color: #1a1a1a;
  cursor: pointer; letter-spacing: 0.3px;
  display: flex; align-items: center; justify-content: center;
  /* No top/left border — only right and bottom */
  border-top: none;
  border-left: none;
  border-right: 2px solid #2a2a2a;
  border-bottom: 2px solid #2a2a2a;
  /* Softer shadow: 3px offset, not 6px */
  box-shadow: 3px 3px 0 0 #2a2a2a;
  transition: box-shadow 0.07s, transform 0.07s;
}
.start-btn:hover { background: #7abcf5; }
.start-btn:active {
  transform: translate(3px, 3px);
  box-shadow: 0 0 0 0 #2a2a2a;
}

/* Fix + glyph optical alignment — it renders slightly low in Chakra Petch */
.stepper-btn:last-child { padding-bottom: 3px; }

/* ═══════════════════════════════════════════════════════
   TIMER SCREEN
═══════════════════════════════════════════════════════ */
#timer-screen {
  padding: 40px 36px 48px;
  align-items: center;
}

/* Clock wrapper — shifts up/down on pause */
.clock-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.clock-wrap.shifted { transform: translateY(-40px); }

/* SVG clock */
/* SVG clock — natural 327×315, display at a comfortable size */
.clock-svg { width: 327px; height: 315px; display: block; }

/* Pause panel — slides in below clock */
.pause-panel {
  width: 100%;
  max-width: 420px;
  margin-top: 24px;
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
}
.pause-panel.open {
  max-height: 200px;
  opacity: 1;
}

.pause-label {
  font-size: 14px; font-weight: 500; color: var(--ink);
  margin-bottom: 6px;
}

/* Timer buttons row */
.timer-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 32px;
}

.timer-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 28px;
  height: 50px;
  border: 2px solid var(--ink);
  border-radius: 50px;
  background: var(--white);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: background 0.12s, transform 0.08s;
  box-shadow: 2px 3px 0 var(--ink);
  min-width: 130px;
}
.timer-btn:hover  { background: #f0ebe3; }
.timer-btn:active { transform: translate(1px,2px); box-shadow: 1px 1px 0 var(--ink); }

.timer-btn svg { flex-shrink: 0; }
</style>
</head>

  <div class="screen" id="setup-screen">

    <div class="field-group">
      <label class="field-label">What should I call you?</label>
      <div class="hd-shell" id="name-shell">
        <div class="hd-content name-content">
          <input id="name-input" type="text" placeholder="Arch" maxlength="40" autocomplete="off" />
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Work duration</label>
      <div class="hd-shell" id="work-shell">
        <div class="hd-content stepper-content">
          <button class="stepper-btn" id="work-minus">−</button>
          <div class="stepper-value" id="work-val">
            <span id="work-display"></span>
            <input type="text" id="work-input" inputmode="numeric" maxlength="2" style="display:none;" />
          </div>
          <button class="stepper-btn" id="work-plus">+</button>
        </div>
      </div>
      <p class="field-msg" id="work-msg"></p>
      <div class="presets" id="work-presets">
        <div class="pill-shell" id="wp0"><button class="preset-btn" data-mins="25">25 mins</button></div>
        <div class="pill-shell" id="wp1"><button class="preset-btn" data-mins="45">45 mins</button></div>
        <div class="pill-shell" id="wp2"><button class="preset-btn" data-mins="60">60 mins</button></div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Break duration</label>
      <div class="hd-shell" id="break-shell">
        <div class="hd-content stepper-content">
          <button class="stepper-btn" id="break-minus">−</button>
          <div class="stepper-value" id="break-val">
            <span id="break-display"></span>
            <input type="text" id="break-input" inputmode="numeric" maxlength="2" style="display:none;" />
          </div>
          <button class="stepper-btn" id="break-plus">+</button>
        </div>
      </div>
      <p class="field-msg" id="break-msg"></p>
    </div>

    <div class="start-wrap">
      <button class="start-btn" id="start-btn">Start session</button>
    </div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════
   SNOOZE POLICE — script.js
═══════════════════════════════════════════════════════ */

/* ── 1. SVG INJECTION ── */
const borderTpl = document.getElementById('tpl-border');
const pillTpl   = document.getElementById('tpl-pill');

function injectBorder(id) {
  const el = document.getElementById(id);
  if (!el || !borderTpl) return;
  el.insertBefore(borderTpl.content.cloneNode(true), el.firstChild);
}
function injectPill(id) {
  const el = document.getElementById(id);
  if (!el || !pillTpl) return;
  el.insertBefore(pillTpl.content.cloneNode(true), el.firstChild);
}

injectBorder('name-shell');
injectBorder('work-shell');
injectBorder('break-shell');
injectBorder('timer-work-shell');
['wp0','wp1','wp2','tp0','tp1','tp2'].forEach(injectPill);


/* ── 2. SHARED STATE ── */
let workMins  = 25;  // 1–60
let breakMins = 5;   // 3–15

const WK_MIN = 1, WK_MAX = 60, WK_STEP = 1;
const BK_MIN = 3, BK_MAX = 15, BK_STEP = 1;

// Timer
let timerTotal    = 25 * 60;
let timerLeft     = 25 * 60;
let timerRunning  = false;
let timerInterval = null;
let pausedDuration = 25 * 60;


/* ── 3. UTILITIES ── */
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function fmtMins(m) { return m === 1 ? '1 min' : `${m} mins`; }

// Show a transient helper message in a .field-msg element.
// Disappears after `delay` ms (default 2500) or on next interaction.
let _msgTimers = {};
function showMsg(elId, text, delay = 2500) {
  const el = document.getElementById(elId);
  if (!el) return;
  clearTimeout(_msgTimers[elId]);
  el.textContent = text;
  el.classList.add('visible');
  _msgTimers[elId] = setTimeout(() => {
    el.classList.remove('visible');
  }, delay);
}
function clearMsg(elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  clearTimeout(_msgTimers[elId]);
  el.classList.remove('visible');
}

// Update disabled visual state of +/- buttons
function updateStepperState(minusId, plusId, value, min, max) {
  const minus = document.getElementById(minusId);
  const plus  = document.getElementById(plusId);
  if (!minus || !plus) return;

  if (value <= min) {
    minus.classList.add('disabled');
    minus.setAttribute('aria-disabled', 'true');
  } else {
    minus.classList.remove('disabled');
    minus.removeAttribute('aria-disabled');
  }

  if (value >= max) {
    plus.classList.add('disabled');
    plus.setAttribute('aria-disabled', 'true');
  } else {
    plus.classList.remove('disabled');
    plus.removeAttribute('aria-disabled');
  }
}

// Sync pill fill colours
function syncPills(groupId, currentMins) {
  document.querySelectorAll(`#${groupId} .pill-shell`).forEach(shell => {
    const btn    = shell.querySelector('button');
    const active = Number(btn.dataset.mins) === currentMins;
    btn.classList.toggle('active', active);
    const fp = shell.querySelector('.pill-fill-path');
    if (fp) fp.setAttribute('fill', active ? '#f5c6d2' : '#FAFAFA');
  });
}


/* ── 4. WORK DURATION ── */
const workDisplay = document.getElementById('work-display');
const workInput   = document.getElementById('work-input');

function renderWork(userChanged = false) {
  workDisplay.textContent = fmtMins(workMins);
  workDisplay.style.color = userChanged ? '#262626' : '';
  syncPills('work-presets', workMins);
  updateStepperState('work-minus', 'work-plus', workMins, WK_MIN, WK_MAX);
}

// Stepper ±1 min — works even when input is in edit mode (mousedown logic)
document.getElementById('work-minus').addEventListener('click', () => {
  if (workMins <= WK_MIN) {
    showMsg('work-msg', `Min work duration is 1 min`);
    return;
  }
  workMins = clamp(workMins - WK_STEP, WK_MIN, WK_MAX);
  clearMsg('work-msg');
  if (wEditing) { workInput.value = String(workMins); workInput.style.color = '#262626'; }
  renderWork(true);
});

document.getElementById('work-plus').addEventListener('click', () => {
  if (workMins >= WK_MAX) {
    showMsg('work-msg', `Max work duration is 60 mins`);
    return;
  }
  workMins = clamp(workMins + WK_STEP, WK_MIN, WK_MAX);
  clearMsg('work-msg');
  if (wEditing) { workInput.value = String(workMins); workInput.style.color = '#262626'; }
  renderWork(true);
});

// Prevent mousedown from blurring input when stepper btns clicked
document.getElementById('work-minus').addEventListener('mousedown', e => e.preventDefault());
document.getElementById('work-plus').addEventListener('mousedown',  e => e.preventDefault());

// Arrow key support on the stepper value area (works in both display and edit mode)
document.getElementById('work-val').addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    document.getElementById('work-plus').click();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    document.getElementById('work-minus').click();
  }
});

// Make the value area keyboard-focusable so arrow keys work without clicking first
document.getElementById('work-val').setAttribute('tabindex', '0');

// Click-to-edit
let wEditing = false;

document.getElementById('work-val').addEventListener('click', () => {
  if (wEditing) return;
  wEditing = true;
  workDisplay.style.display = 'none';
  workInput.style.display   = 'block';
  workInput.value           = String(workMins);
  workInput.style.color     = '#b0a89f';
  workInput.focus();
  workInput.select();
});

workInput.addEventListener('input', () => {
  workInput.value = workInput.value.replace(/\D/g, '');
  workInput.style.color = '#262626';
  clearMsg('work-msg');
});

workInput.addEventListener('keydown', e => {
  if (e.key === 'Enter')  { e.preventDefault(); workInput.blur(); }
  if (e.key === 'Escape') { wEditing = false; _cancelWork(); }
});

function commitWork() {
  if (!wEditing) return;
  wEditing = false;
  workInput.style.display  = 'none';
  workDisplay.style.display = '';
  const raw = parseInt(workInput.value, 10);
  if (!isNaN(raw)) {
    if (raw === 0) {
      workMins = WK_MIN;
      showMsg('work-msg', `Min work duration is 1 min`);
    } else if (raw > WK_MAX) {
      workMins = WK_MAX;
      showMsg('work-msg', `Max work duration is 60 mins`);
    } else {
      workMins = raw;
    }
  }
  renderWork(true);
}
function _cancelWork() {
  workInput.style.display  = 'none';
  workDisplay.style.display = '';
  renderWork(false);
}
workInput.addEventListener('blur', commitWork);

// Presets
document.querySelectorAll('#work-presets .preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    workMins = Number(btn.dataset.mins);
    if (wEditing) { wEditing = false; workInput.style.display = 'none'; workDisplay.style.display = ''; }
    clearMsg('work-msg');
    renderWork(true);
  });
});


/* ── 5. BREAK DURATION ── */
const breakDisplay = document.getElementById('break-display');
const breakInput   = document.getElementById('break-input');

function renderBreak(userChanged = false) {
  breakDisplay.textContent = fmtMins(breakMins);
  breakDisplay.style.color = userChanged ? '#262626' : '';
  updateStepperState('break-minus', 'break-plus', breakMins, BK_MIN, BK_MAX);
}

document.getElementById('break-minus').addEventListener('click', () => {
  if (breakMins <= BK_MIN) {
    showMsg('break-msg', `Min break duration is 3 mins`);
    return;
  }
  breakMins = clamp(breakMins - BK_STEP, BK_MIN, BK_MAX);
  clearMsg('break-msg');
  if (bEditing) { breakInput.value = String(breakMins); breakInput.style.color = '#262626'; }
  renderBreak(true);
});

document.getElementById('break-plus').addEventListener('click', () => {
  if (breakMins >= BK_MAX) {
    showMsg('break-msg', `Max break duration is 15 mins`);
    return;
  }
  breakMins = clamp(breakMins + BK_STEP, BK_MIN, BK_MAX);
  clearMsg('break-msg');
  if (bEditing) { breakInput.value = String(breakMins); breakInput.style.color = '#262626'; }
  renderBreak(true);
});

document.getElementById('break-minus').addEventListener('mousedown', e => e.preventDefault());
document.getElementById('break-plus').addEventListener('mousedown',  e => e.preventDefault());

document.getElementById('break-val').setAttribute('tabindex', '0');
document.getElementById('break-val').addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    document.getElementById('break-plus').click();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    document.getElementById('break-minus').click();
  }
});

let bEditing = false;

document.getElementById('break-val').addEventListener('click', () => {
  if (bEditing) return;
  bEditing = true;
  breakDisplay.style.display = 'none';
  breakInput.style.display   = 'block';
  breakInput.value           = String(breakMins);
  breakInput.style.color     = '#b0a89f';
  breakInput.focus();
  breakInput.select();
});

breakInput.addEventListener('input', () => {
  breakInput.value = breakInput.value.replace(/\D/g, '');
  breakInput.style.color = '#262626';
  clearMsg('break-msg');
});

breakInput.addEventListener('keydown', e => {
  if (e.key === 'Enter')  { e.preventDefault(); breakInput.blur(); }
  if (e.key === 'Escape') { bEditing = false; _cancelBreak(); }
});

function commitBreak() {
  if (!bEditing) return;
  bEditing = false;
  breakInput.style.display  = 'none';
  breakDisplay.style.display = '';
  const raw = parseInt(breakInput.value, 10);
  if (!isNaN(raw)) {
    if (raw < BK_MIN) {
      breakMins = BK_MIN;
      showMsg('break-msg', `Min break duration is 3 mins`);
    } else if (raw > BK_MAX) {
      breakMins = BK_MAX;
      showMsg('break-msg', `Max break duration is 15 mins`);
    } else {
      breakMins = raw;
    }
  }
  renderBreak(true);
}
function _cancelBreak() {
  breakInput.style.display  = 'none';
  breakDisplay.style.display = '';
  renderBreak(false);
}
breakInput.addEventListener('blur', commitBreak);


/* ── 6. CLOCK SEGMENT DRAWING ── */
const CX = 164.176, CY = 163.854, R = 108, IR = 5;

function clockX(deg, r) { return CX + r * Math.cos((deg - 90) * Math.PI / 180); }
function clockY(deg, r) { return CY + r * Math.sin((deg - 90) * Math.PI / 180); }

function drawSegment(remainSecs, totalSecs) {
  const seg = document.getElementById('timer-segment');
  if (!seg) return;
  if (remainSecs <= 0 || totalSecs <= 0) { seg.setAttribute('d', ''); return; }

  const fraction = remainSecs / totalSecs;
  const sweepDeg = fraction * 360;

  if (sweepDeg >= 359.9) {
    seg.setAttribute('d', `M ${CX} ${CY - R} A ${R} ${R} 0 1 1 ${CX - 0.01} ${CY - R} Z`);
    return;
  }

  const large = sweepDeg > 180 ? 1 : 0;
  const x1  = clockX(0, R).toFixed(2),  y1  = clockY(0, R).toFixed(2);
  const x2  = clockX(sweepDeg, R).toFixed(2),  y2  = clockY(sweepDeg, R).toFixed(2);
  const xi1 = clockX(0, IR).toFixed(2), yi1 = clockY(0, IR).toFixed(2);
  const xi2 = clockX(sweepDeg, IR).toFixed(2), yi2 = clockY(sweepDeg, IR).toFixed(2);

  seg.setAttribute('d', [
    `M ${xi1} ${yi1}`, `L ${x1} ${y1}`,
    `A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`,
    `L ${xi2} ${yi2}`,
    `A ${IR} ${IR} 0 ${large} 0 ${xi1} ${yi1}`, 'Z'
  ].join(' '));
}


/* ── 7. TIMER ENGINE ── */
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerRunning = true;
  timerInterval = setInterval(() => {
    if (timerLeft <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      drawSegment(0, timerTotal);
      playDone();
      return;
    }
    timerLeft--;
    drawSegment(timerLeft, timerTotal);
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerRunning  = false;
}

function restartTimer() {
  pauseTimer();
  timerLeft = timerTotal;
  drawSegment(timerLeft, timerTotal);
  startTimer();
}

function playDone() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.4, 0.8].forEach(delay => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.8);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.8);
    });
  } catch(_) {}
}


/* ── 8. PAUSE PANEL (timer screen duration editor) ── */
function renderTimerWork() {
  const mins = Math.round(pausedDuration / 60);
  document.getElementById('t-work-display').textContent = fmtMins(mins);
  document.querySelectorAll('#timer-presets .pill-shell').forEach(shell => {
    const btn    = shell.querySelector('button');
    const active = Number(btn.dataset.mins) * 60 === pausedDuration;
    btn.classList.toggle('active', active);
    const fp = shell.querySelector('.pill-fill-path');
    if (fp) fp.setAttribute('fill', active ? '#f5c6d2' : '#FAFAFA');
  });
}

document.getElementById('t-work-minus').addEventListener('click', e => {
  e.stopPropagation();
  pausedDuration = clamp(pausedDuration - 5 * 60, WK_MIN * 60, WK_MAX * 60);
  renderTimerWork();
});
document.getElementById('t-work-plus').addEventListener('click', e => {
  e.stopPropagation();
  pausedDuration = clamp(pausedDuration + 5 * 60, WK_MIN * 60, WK_MAX * 60);
  renderTimerWork();
});
document.querySelectorAll('#timer-presets .preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    pausedDuration = Number(btn.dataset.mins) * 60;
    renderTimerWork();
  });
});


/* ── 9. PAUSE / RESUME / RESTART ── */
const pauseBtn   = document.getElementById('pause-btn');
const restartBtn = document.getElementById('restart-btn');
const clockWrap  = document.getElementById('clock-wrap');
const pausePanel = document.getElementById('pause-panel');

let isPaused = false;

const PAUSE_ICON  = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="2" width="4" height="14" rx="1.5" fill="#262626"/><rect x="11" y="2" width="4" height="14" rx="1.5" fill="#262626"/></svg>`;
const RESUME_ICON = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M5 3l11 6-11 6V3z" fill="#262626"/></svg>`;

pauseBtn.addEventListener('click', () => {
  if (!isPaused) {
    pauseTimer();
    isPaused = true;
    pausedDuration = timerTotal;
    pauseBtn.innerHTML = RESUME_ICON + ' Resume';
    clockWrap.classList.add('shifted');
    pausePanel.classList.add('open');
    renderTimerWork();
  } else {
    if (pausedDuration !== timerTotal) {
      timerTotal = pausedDuration;
      timerLeft  = pausedDuration;
      drawSegment(timerLeft, timerTotal);
    }
    isPaused = false;
    pauseBtn.innerHTML = PAUSE_ICON + ' Pause';
    clockWrap.classList.remove('shifted');
    pausePanel.classList.remove('open');
    startTimer();
  }
});

restartBtn.addEventListener('click', () => {
  isPaused = false;
  pauseBtn.innerHTML = PAUSE_ICON + ' Pause';
  clockWrap.classList.remove('shifted');
  pausePanel.classList.remove('open');
  restartTimer();
});


/* ── 10. SCREEN TRANSITIONS ── */
function goToTimer() {
  const secs     = workMins * 60;
  timerTotal     = secs;
  timerLeft      = secs;
  pausedDuration = secs;
  isPaused       = false;
  pauseBtn.innerHTML = PAUSE_ICON + ' Pause';
  clockWrap.classList.remove('shifted');
  pausePanel.classList.remove('open');
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('timer-screen').classList.remove('hidden');
  drawSegment(timerLeft, timerTotal);
  startTimer();
}

function goToSetup() {
  pauseTimer();
  isPaused = false;
  document.getElementById('timer-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
}

document.getElementById('start-btn').addEventListener('click', goToTimer);
document.getElementById('back-btn').addEventListener('click', goToSetup);


/* ── 11. INIT ── */
renderWork(false);
renderBreak(false);
</script>
